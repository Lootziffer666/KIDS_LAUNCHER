<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kids Launcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <div id="app">
    <header class="launcher-header">
      <h1 class="launcher-title">Kids Launcher</h1>
    </header>
    <main class="launcher-main">
      <p class="launcher-loading" id="loading-text">Bibliothek lädt…</p>
      <div class="library-grid" id="library-grid" style="display:none;"></div>
    </main>
    <footer class="focus-bar" id="focus-bar" style="display:none;">
      <span class="focus-bar__action">
        <span class="focus-bar__key" data-action="confirm">A</span> Start
      </span>
      <span class="focus-bar__action">
        <span class="focus-bar__key" data-action="info">X</span> Info
      </span>
      <span class="focus-bar__action">
        <span class="focus-bar__key" data-action="trailer">Y</span> Trailer
      </span>
      <span class="focus-bar__action">
        <span class="focus-bar__key" data-action="back">B</span> Zurück
      </span>
    </footer>
    <div class="info-overlay" id="info-overlay"></div>
    <div class="trailer-overlay" id="trailer-overlay"></div>
    <div class="launch-overlay" id="launch-overlay"></div>
    <div class="toast" id="toast"></div>
  </div>
  <script src="scripts/launch-adapter.js"></script>
  <script src="scripts/main.js"></script>
</body>
</html>
